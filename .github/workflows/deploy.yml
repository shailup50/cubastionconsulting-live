name: Deploy Next.js to GoDaddy

on:
  push:
    branches:
      - lakshay # (Change this to lakshay if you want to deploy on pushes to that branch)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # (Change to 20 if your project uses Node 20)

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Zip Files for Transfer
        # Zips everything but excludes node_modules and .git to keep the file small
        run: zip -r deploy.zip . -x "node_modules/*" -x ".git/*"

      - name: Copy Zip to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip"
          target: "/home/cubastionconsult/cubtest/cubastionconsulting-testing/cubastionconsulting-live"

      - name: SSH into VPS, Unzip, and Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Go to the project directory
            cd /home/cubastionconsult/cubtest/cubastionconsulting-testing/cubastionconsulting-live

            # Unzip the new build (overwrite existing files)
            unzip -o deploy.zip
            rm deploy.zip

            # Install production dependencies only (low CPU usage)
            npm install --production

            # Start PM2 if it doesn't exist, or restart it if it does
            pm2 describe cubastion-test > /dev/null
            if [ $? -eq 0 ]; then
                pm2 restart cubastion-test
            else
                pm2 start npm --name "cubastion-test" -- start -- -p 3005
            fi

            # Save PM2 state so it auto-restarts on server reboots
            pm2 save
